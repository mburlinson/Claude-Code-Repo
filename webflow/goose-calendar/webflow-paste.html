<!-- ──────────────────────────────────────────────────────────────────
     BLOCK 4 — HIDDEN CMS DATA LIST (reference markup)
     This is the SHAPE the JS expects. Build it in Designer:

       1. Add a Collection List, bind to "Calendar Events"
       2. On the wrapper element add inline style:  display: none
       3. Inside each Collection Item, add elements with the
          Custom Attribute  data-field = <slug>  AND bind their text
          (or image src) to the matching CMS field via Designer.
       4. Wrap each item in a Link Block pointing to the detail page.

     The HTML below shows EXACTLY what one rendered item should look
     like after Webflow renders the bindings. Use it as a checklist.
     ────────────────────────────────────────────────────────────────── -->

<div id="eventsList" style="display:none;">
  <div class="w-dyn-list">
    <div role="list" class="w-dyn-items">

      <!-- One of these per Calendar Event item -->
      <div role="listitem" class="w-dyn-item">

        <a href="/calendar-events/SLUG-FROM-CMS" data-field="detail-link"></a>

        <div data-field="name">Event Name from CMS</div>
        <div data-field="start-date-time">2026-05-09T19:00:00-04:00</div>
        <div data-field="end-date-time">2026-05-09T22:00:00-04:00</div>
        <div data-field="all-day-event">false</div>
        <div data-field="recurring">false</div>
        <div data-field="frequency"></div>
        <div data-field="day-of-week"></div>
        <div data-field="week-of-month"></div>
        <div data-field="recurrence-end-date"></div>
        <div data-field="category">Live Music</div>
        <div data-field="short-summary">Short summary text from CMS.</div>
        <div data-field="cost">Free entry</div>

        <img data-field="hero-image" src="" alt="" />

      </div>

    </div>
  </div>
</div>


<!-- ──────────────────────────────────────────────────────────────────
     NOTE on Webflow Custom Code editor wrapping
     The script src URLs above are long. The Webflow editor sometimes
     word-wraps long URLs and inserts whitespace, which silently breaks
     them. After pasting, click each <script> / <link> line in the
     editor and confirm the URL is on a SINGLE physical line with no
     stray spaces. If it keeps mangling them, switch to the registered-
     site-script approach via the Webflow Data API (data_scripts_tool).
